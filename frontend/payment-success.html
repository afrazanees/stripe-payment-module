<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Success</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .success-container {
      background: white;
      border-radius: 12px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 500px;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: #28a745;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
      animation: scaleIn 0.4s ease 0.2s both;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      font-size: 16px;
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .transaction-id {
      background: #f8f9fa;
      padding: 12px 16px;
      border-radius: 6px;
      margin: 20px 0;
      font-family: monospace;
      color: #666;
      font-size: 13px;
      word-break: break-all;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #5469d4, #4c63ce);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(84, 105, 212, 0.4);
    }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="success-icon">✓</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for your purchase.</p>
    <div class="transaction-id" id="transaction-id">Loading...</div>
    <a href="/" class="button">Return to Home</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const transactionId = params.get('payment_intent') || 'N/A';
    document.getElementById('transaction-id').textContent = `Transaction ID: ${transactionId}`;
  </script>
</body>
</html>
